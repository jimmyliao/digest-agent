sources:
  - id: google-official
    name: Google Official Blog
    url: https://blog.google/feed/
    type: rss
    enabled: true
    frequency_hours: 6
    category: official
  - id: google-cloud
    name: Google Cloud Blog
    url: https://cloud.google.com/blog/feed/
    type: rss
    enabled: true
    frequency_hours: 12
    category: cloud
  - id: google-ai
    name: Google AI Blog
    url: https://ai.googleblog.com/feeds/posts/default
    type: rss
    enabled: true
    frequency_hours: 24
    category: ai

  # 台股財經 — Phase 4 個股分析 news_collector 也會讀取這些來源
  - id: yahoo-tw-stock
    name: Yahoo 台灣股市
    url: https://tw.stock.yahoo.com/rss
    type: rss
    enabled: true
    frequency_hours: 6
    category: finance_tw
  - id: twse-news
    name: TWSE 台灣證交所
    url: https://www.twse.com.tw/rwd/zh/news/feed?type=rss
    type: rss
    enabled: true
    frequency_hours: 6
    category: finance_tw
  - id: technews-finance
    name: TechNews 科技新報
    url: https://technews.tw/feed/
    type: rss
    enabled: true
    frequency_hours: 12
    category: finance_tw

schedule:
  fetch: "0 6,12,18 * * *"
  summarize: "30 6,12,18 * * *"
  publish: "45 6,12,18 * * *"
  timezone: "Asia/Taipei"

gemini:
  model: gemini-2.5-flash
  max_tokens: 500
  temperature: 0.7
  daily_budget_usd: 5.0
